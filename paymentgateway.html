<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway - Big Umroh CMS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        gold: {
                            DEFAULT: '#cb9032',
                            50: '#fdf9f2',
                            100: '#f9f0e0',
                            200: '#f3dec0',
                            300: '#ebc595',
                            400: '#e1a65f',
                            500: '#cb9032', // Base Color
                            600: '#b07527',
                            700: '#8d5a22',
                            800: '#734822',
                            900: '#5f3c20',
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cb9032; 
        }
        .sidebar-menu-item {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .sidebar-menu-item:hover, .sidebar-menu-item.active {
            background: linear-gradient(90deg, #fdf9f2 0%, #ffffff 100%);
            color: #cb9032;
            border-left-color: #cb9032;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-72 bg-white border-r border-gray-100 hidden md:flex flex-col z-20 shadow-soft">
            <!-- Logo Section -->
            <div class="h-20 flex items-center px-8 border-b border-gray-50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gold rounded-xl flex items-center justify-center text-white shadow-lg shadow-gold/30">
                        <i class="fas fa-kaaba text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-800 leading-tight">Big Umroh</h1>
                        <p class="text-[10px] text-gray-400 font-medium tracking-widest uppercase">CMS Core System</p>
                    </div>
                </div>
            </div>

            <!-- Navigation (Simplified) -->
            <nav class="flex-1 overflow-y-auto px-4 space-y-1 pb-4 pt-6">
                <a href="index.html" class="sidebar-menu-item active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gold group focus:outline-none">
                    <i class="fas fa-store"></i>
                    <span>Merchant</span>
                </a>
            </nav>

            <!-- Bottom Action -->
            <div class="p-4 border-t border-gray-100">
                <button class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-gray-50 hover:bg-red-50 text-gray-600 hover:text-red-600 rounded-xl transition-colors text-sm font-medium">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT WRAPPER -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden bg-[#f9fafb]">
            
            <!-- TOP HEADER -->
            <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8 z-10 sticky top-0">
                <!-- Left: Breadcrumb -->
                <div class="flex items-center gap-6">
                    <div class="hidden md:block">
                        <h2 class="text-xl font-bold text-gray-800">Payment Gateway</h2>
                        <div class="flex items-center gap-2 text-xs text-gray-400">
                            <a href="index.html" class="hover:text-gold">Home</a>
                            <i class="fas fa-chevron-right text-[8px]"></i>
                            <a href="index.html" class="hover:text-gold">Merchant</a>
                            <i class="fas fa-chevron-right text-[8px]"></i>
                            <span class="text-gold">Payment Gateway</span>
                        </div>
                    </div>
                </div>

                <!-- Right: Actions -->
                <div class="flex items-center gap-4">
                    <button class="relative w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-gray-100 text-gray-500 hover:text-gold hover:border-gold hover:shadow-lg hover:shadow-gold/10 transition-all">
                        <i class="far fa-bell text-lg"></i>
                        <span class="absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                </div>
            </header>

            <!-- SCROLLABLE CONTENT -->
            <main class="flex-1 overflow-y-auto p-8 scroll-smooth relative">
                
                <div class="mb-6 flex items-center gap-4">
                    <a href="index.html" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <div>
                        <h3 class="text-xl font-bold text-gray-800">Daftar Payment Gateway</h3>
                        <p class="text-sm text-gray-500">Aktifkan payment gateway untuk merchant.</p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-soft overflow-hidden border border-gray-100">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider border-b border-gray-100">
                                    <th class="p-4 font-semibold">No</th>
                                    <th class="p-4 font-semibold">Nama Layanan</th>
                                    <th class="p-4 font-semibold">Payment Gateway</th>
                                    <th class="p-4 font-semibold">Status</th>
                                    <th class="p-4 font-semibold text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm divide-y divide-gray-100">
                                <!-- Dummy 1 -->
                                <tr class="hover:bg-gray-50 transition-colors">
                                    <td class="p-4 text-gray-500">1</td>
                                    <td class="p-4 font-medium text-gray-800">BNI VA</td>
                                    <td class="p-4 text-gray-600">Xendit</td>
                                    <td class="p-4">
                                        <span class="bg-green-50 text-green-600 text-xs px-2 py-1 rounded-lg border border-green-100 font-medium">Aktif</span>
                                    </td>
                                    <td class="p-4 text-center">
                                        <label class="flex justify-center items-center cursor-pointer">
                                            <input type="checkbox" class="h-5 w-5 rounded text-gold focus:ring-gold border-gray-300">
                                        </label>
                                    </td>
                                </tr>
                                <!-- Dummy 2 -->
                                <tr class="hover:bg-gray-50 transition-colors">
                                    <td class="p-4 text-gray-500">2</td>
                                    <td class="p-4 font-medium text-gray-800">Mandiri VA</td>
                                    <td class="p-4 text-gray-600">Midtrans</td>
                                    <td class="p-4">
                                        <span class="bg-green-50 text-green-600 text-xs px-2 py-1 rounded-lg border border-green-100 font-medium">Aktif</span>
                                    </td>
                                    <td class="p-4 text-center">
                                        <label class="flex justify-center items-center cursor-pointer">
                                            <input type="checkbox" class="h-5 w-5 rounded text-gold focus:ring-gold border-gray-300">
                                        </label>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
